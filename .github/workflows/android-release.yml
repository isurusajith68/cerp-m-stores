name: Android Release

on:
  push:
    tags:
      - 'v*'

# Required so the default GITHUB_TOKEN can create the GitHub Release and
# upload the APK asset. Without this the action fails with HTTP 403
# "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          # Use printf (not echo) and strip whitespace so any stray newlines
          # introduced when copy-pasting into the GitHub secret are tolerated.
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r\n\t ' | base64 -d > app/release.keystore
          echo "Keystore size: $(wc -c < app/release.keystore) bytes"
          echo "Keystore SHA256:"
          sha256sum app/release.keystore

      - name: Verify keystore password
        run: |
          # Fail fast if password or base64 is wrong — saves a 3-minute build cycle.
          keytool -list -keystore app/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" >/dev/null
          echo "Keystore opens correctly."

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/cerp-stores-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CERP Stores v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/cerp-stores-${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f app/release.keystore
